[repo_info]
repo_title = EHRI-KG API
api_description = This API allows you to access the contents of the EHRI-KG in a more structured manner without needing to write SPARQL. It includes information about countries, collection-holding institutions and archival descriptions which are at the same time a reflect of the contents of the EHRI Portal, an aggregator that offers access to information on Holocaust-related archival material held in institutions across Europe and beyond.